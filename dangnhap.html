<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="css/dangnhap.css" />
  </head>
  <body>
    <div class="back-ground">
      <img src="./img/113822295_p0 1.png" alt="" />
    </div>

    <div class="title">
      <h2>CHÀO MỪNG BẠN ĐẾN VỚI AYA BOOK</h2>
    </div>

    <div class="login-box">
      <h2>Đăng nhập</h2>

      <form>
        <div class="input-group">
          <label></label>
          <div class="input-box">
            <input type="email" placeholder="Email" />
            <img
              src="https://img.icons8.com/ios-glyphs/24/000000/new-post.png"
            />
          </div>
        </div>

        <div class="input-group">
          <label></label>
          <div class="input-box">
            <input type="password" placeholder="Mật khẩu" />
            <img src="https://img.icons8.com/ios-glyphs/24/000000/lock.png" />
          </div>
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" />
            Nhớ mật khẩu
          </label>
          <a href="#" class="forgot">Quên mật khẩu</a>
        </div>

        <button type="submit" class="btn-login">Đăng nhập</button>

        <div class="register-section">
          <!-- <a href="#" class="no-account">Không nhớ tài khoản?</a> -->
          <button class="btn-register"><a href="dangki.html">Đăng ký ngay</a></button>
        </div>
      </form>
    </div>
    <script src="js/dangnhap.js"></script>
  </body>
</html>
