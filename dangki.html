<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký</title>
  <link rel="stylesheet" href="css/dangki.css" />
</head>

<body>
  <div class="background">
    <img src="./img/113822295_p0 1.png" alt="background" />
  </div>
  <div class="register">
    <h2>Đăng ký</h2>
    <form>
      <label for="email"></label>
      <div class="input-box">
        <input type="email" id="email" placeholder="Email" />
        <img src="https://img.icons8.com/ios-glyphs/30/000000/new-post.png" />
      </div>
      <label for="password"></label>
      <div class="input-box">
        <input type="password" id="password" placeholder="Mật khẩu" />
        <img src="https://img.icons8.com/ios-glyphs/30/000000/lock.png" />
      </div>
      <label for="name"></label>
      <div class="input-box">
        <input type="text" id="name" placeholder="Tên" />
        <img src="https://img.icons8.com/ios-glyphs/30/000000/user.png" />
      </div>
      <div class="checkbox">
        <input type="checkbox" id="agree" />
        <label for="agree">Tôi đồng ý với các điều khoản</label>
      </div>
      <button type="submit" class="dang-ki">Đăng ký</button>

      <div class="sign-in-section">
        <a href="#" class="ask">Sẵn sàng tạo tài khoản?</a>
        <button class="btn-sign-in" id="goLogin">Đăng nhập ngay</button>
      </div>
    </form>
  </div>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/dangki.js"></script>
</body>

</html>
